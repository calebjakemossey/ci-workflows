name: Release

on:
  workflow_call:
    inputs:
      ros-distro:
        description: ROS distribution
        type: string
        default: humble
      variants:
        description: JSON array of build variants
        type: string
        default: '["v1", "v2"]'
      registry:
        description: Container registry (defaults to ghcr.io)
        type: string
        default: ""
      image-name:
        description: Image name (without registry prefix)
        type: string
        required: true
    secrets:
      registry-token:
        description: Token for container registry authentication
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-variant:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        variant: ${{ fromJson(inputs.variants) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.registry-token }}

      - name: Extract version
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "version=${REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            ROS_DISTRO=${{ inputs.ros-distro }}
            VARIANT=${{ matrix.variant }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ steps.version.outputs.version }}-${{ matrix.variant }}
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest-${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
