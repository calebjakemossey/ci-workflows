name: Release

on:
  workflow_call:
    inputs:
      ros-distro:
        description: ROS distribution
        type: string
        default: humble
      variants:
        description: JSON array of build variants
        type: string
        default: '["v1", "v2"]'
      registry:
        description: Container registry (defaults to ghcr.io)
        type: string
        default: ""
      image-name:
        description: Image name (without registry prefix)
        type: string
        required: true
    secrets:
      registry-token:
        description: Token for container registry authentication
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build-variant:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        variant: ${{ fromJson(inputs.variants) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Checkout ci-workflows for Dockerfile
        uses: actions/checkout@v4
        with:
          repository: calebjakemossey/ci-workflows
          ref: v1
          path: .ci-workflows

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.registry-token }}

      - uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Set registry prefix
        id: registry
        run: echo "prefix=${{ inputs.registry || format('ghcr.io/{0}', github.repository_owner) }}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .ci-workflows/Dockerfile.release
          push: true
          build-args: |
            ROS_DISTRO=${{ inputs.ros-distro }}
            VARIANT=${{ matrix.variant }}
          tags: |
            ${{ steps.registry.outputs.prefix }}/${{ inputs.image-name }}:${{ steps.version.outputs.version }}-${{ matrix.variant }}
            ${{ steps.registry.outputs.prefix }}/${{ inputs.image-name }}:latest-${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max
