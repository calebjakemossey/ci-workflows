name: ROS CI

on:
  workflow_call:
    inputs:
      ros-distro:
        description: ROS distribution
        type: string
        default: humble
      repos-file:
        description: Path to .repos file for vcs import
        type: string
        default: workspace.repos
      container-image:
        description: Override container image (default uses ros-ci from GHCR)
        type: string
        default: ""

concurrency:
  group: ros-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ${{ inputs.container-image || format('ghcr.io/{0}/ros-ci:{1}', github.repository_owner, inputs.ros-distro) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ament_flake8
        run: |
          . /opt/ros/${{ inputs.ros-distro }}/setup.sh
          ament_flake8

      - name: Run ament_pep257
        run: |
          . /opt/ros/${{ inputs.ros-distro }}/setup.sh
          ament_pep257

      - name: Run ament_copyright
        run: |
          . /opt/ros/${{ inputs.ros-distro }}/setup.sh
          find . -name '*.py' -not -path './build/*' -not -path './install/*' | xargs ament_copyright

  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ${{ inputs.container-image || format('ghcr.io/{0}/ros-ci:{1}', github.repository_owner, inputs.ros-distro) }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    steps:
      - name: Configure git safe directory
        run: git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src/repo

      - name: Set up workspace
        env:
          REPOS_FILE: ${{ inputs.repos-file }}
        run: |
          mkdir -p /ros_ws/src
          cp -r $GITHUB_WORKSPACE/src/repo /ros_ws/src/repo
          if [ -f "/ros_ws/src/repo/${REPOS_FILE}" ]; then
            cd /ros_ws && vcs import src < "/ros_ws/src/repo/${REPOS_FILE}"
          fi

      - name: Cache colcon workspace
        uses: actions/cache@v4
        with:
          path: |
            /ros_ws/build
            /ros_ws/install
            /ros_ws/log
          key: colcon-${{ inputs.ros-distro }}-${{ hashFiles('**/package.xml') }}
          restore-keys: |
            colcon-${{ inputs.ros-distro }}-

      - name: Install rosdep dependencies
        env:
          ROS_DISTRO: ${{ inputs.ros-distro }}
        working-directory: /ros_ws
        run: |
          . /opt/ros/${ROS_DISTRO}/setup.sh
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y

      - name: Build
        env:
          ROS_DISTRO: ${{ inputs.ros-distro }}
        working-directory: /ros_ws
        run: |
          . /opt/ros/${ROS_DISTRO}/setup.sh
          colcon build --symlink-install

      - name: Test
        env:
          ROS_DISTRO: ${{ inputs.ros-distro }}
        working-directory: /ros_ws
        run: |
          . /opt/ros/${ROS_DISTRO}/setup.sh
          . install/setup.sh
          colcon test
          colcon test-result --verbose

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ros-test-results
          path: /ros_ws/build/**/test_results/**/*.xml

  # Publish test results as a separate job running outside the container
  # (dorny/test-reporter requires git access which isn't available in /ros_ws)
  report-results:
    needs: build-and-test
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: ros-test-results
          path: test-results

      - name: Publish test results
        uses: dorny/test-reporter@v1
        with:
          name: ROS Test Results
          path: 'test-results/**/*.xml'
          reporter: java-junit
