name: Build CI Image

on:
  push:
    branches: [main]
    paths: [Dockerfile]
  workflow_dispatch:

concurrency:
  group: build-ci-image
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ros-ci:humble
            ghcr.io/${{ github.repository_owner }}/ros-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
